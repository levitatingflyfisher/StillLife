name: still_life
description: "Still Life - Home Inventory Management System. Offline-first, privacy-respecting home inventory with AI-powered video walkthrough analysis."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Database
  drift: ^2.25.0
  sqlite3_flutter_libs: ^0.5.0

  # Navigation
  go_router: ^15.1.0

  # UI / Theme
  openhearth_design:
    path: ../OpenHearth/ohStyle/openhearth_design
  fl_chart: ^0.70.2
  intl: ^0.20.2
  qr_flutter: ^4.1.0

  # HTTP
  dio: ^5.8.0

  # Camera & Video
  camera: ^0.11.0+2
  ffmpeg_kit_flutter_new: ^4.1.0

  # ML / AI
  tflite_flutter: ^0.11.0

  # Network Discovery
  nsd: ^3.0.0

  # Barcode & OCR
  mobile_scanner: ^6.0.0
  google_mlkit_text_recognition: ^0.14.0

  # Speech Recognition
  speech_to_text: ^7.0.0

  # Image handling
  image_picker: ^1.1.2
  image: ^4.5.3

  # HTML parsing
  html: ^0.15.5

  # PDF Generation
  pdf: ^3.11.3
  printing: ^5.14.1

  # Storage & Security
  flutter_secure_storage: ^9.2.4
  path_provider: ^2.1.5
  path: ^1.9.1
  share_plus: ^10.1.4
  file_picker: ^9.2.1

  # Local Notifications
  flutter_local_notifications: ^18.0.0
  timezone: ^0.10.1

  # Sync / P2P
  crdt: ^5.1.3
  shelf: ^1.4.0
  shelf_router: ^1.1.4

  # CSV parsing
  csv: ^6.0.0

  # Share / receive shared files
  receive_sharing_intent: ^1.8.0

  # Deep links (Phase 22a — Stripe checkout return)
  app_links: ^6.3.2

  # External URL launching (Phase 22a — Stripe checkout)
  url_launcher: ^6.3.1

  # App version metadata (used by Settings → About)
  package_info_plus: ^8.1.2

  # Utilities
  uuid: ^4.5.1
  equatable: ^2.0.7
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  collection: ^1.19.1
  archive: ^4.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.15
  drift_dev: ^2.25.0
  riverpod_generator: ^2.6.5
  freezed: ^3.0.0
  json_serializable: ^6.9.4

  # Testing
  mockito: ^5.4.6
  build_verify: ^3.1.0
  mocktail: ^1.0.4
  sqlite3: ^2.9.4
  http_mock_adapter: ^0.6.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/
    - assets/models/

  fonts:
    - family: Lora
      fonts:
        - asset: assets/fonts/Lora-Regular.ttf
        - asset: assets/fonts/Lora-Italic.ttf
          style: italic
        - asset: assets/fonts/Lora-Medium.ttf
          weight: 500
        - asset: assets/fonts/Lora-Bold.ttf
          weight: 700
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-Medium.ttf
          weight: 500
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
